name: GSIR Determinism Gates

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locked deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Compile (basic sanity)
        run: |
          python -m compileall src migrations tests

      - name: Enforce registry immutability (only additions)
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          git diff --name-status "$BASE_SHA" "$HEAD_SHA" > diff.txt
          cat diff.txt
          if grep -E '^(M|D|R)[[:space:]]+registry/' diff.txt; then
            echo "Registry immutability violated (only additions allowed)."
            exit 1
          fi

      - name: Verify transform version registry consistency
        run: |
          python - << 'PY'
          import json
          d=json.load(open("transform_versions.json","r",encoding="utf-8"))
          assert "approved_versions" in d and "latest_version" in d
          assert d["latest_version"] in d["approved_versions"]
          print("transform_versions.json OK")
          PY

      - name: Verify migration plan aligns with transform versions
        run: |
          python - << 'PY'
          import json, yaml, os, sys
          tv=json.load(open("transform_versions.json","r",encoding="utf-8"))
          mp=yaml.safe_load(open("migrations/migration_plan.yaml","r",encoding="utf-8"))
          assert mp["current_latest"] == tv["latest_version"], "migration_plan current_latest != transform_versions latest_version"
          # Ensure every allowed migration targets an approved version
          approved=set(tv["approved_versions"])
          for m in mp.get("allowed_migrations", []):
            assert m["from"] in approved, f"migration from-version not approved: {m['from']}"
            assert m["to"] in approved, f"migration to-version not approved: {m['to']}"
          print("migration_plan.yaml OK")
          PY

      - name: Run migration tests
        run: |
          pytest -q

      - name: Determinism + signature gate
        run: |
          python src/determinism_checker.py task_schema.yaml